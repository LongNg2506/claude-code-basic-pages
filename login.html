<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            surface: '#090A14',
            primary: '#DF6B33',
          },
          fontFamily: {
            poppins: ['Poppins', 'sans-serif'],
            inter: ['Inter', 'sans-serif'],
          },
        },
      },
    };
  </script>
  <style>
    body { background-color: #090A14; }
    input:-webkit-autofill,
    input:-webkit-autofill:hover,
    input:-webkit-autofill:focus {
      -webkit-box-shadow: 0 0 0px 1000px #1a1b2e inset;
      -webkit-text-fill-color: #e2e8f0;
      transition: background-color 5000s ease-in-out 0s;
    }
    .glass-card {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.07);
    }
    .social-btn {
      transition: all 0.25s ease;
    }
    .social-btn:hover {
      background: rgba(255, 255, 255, 0.07);
      border-color: rgba(255, 255, 255, 0.18);
    }
    .primary-btn {
      background: #DF6B33;
      transition: all 0.25s ease;
    }
    .primary-btn:hover {
      background: #c85d2a;
      box-shadow: 0 0 28px rgba(223, 107, 51, 0.35);
      transform: translateY(-1px);
    }
    .primary-btn:active {
      transform: translateY(0);
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(24px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-fade-in { animation: fadeInUp 0.5s ease forwards; }
    .delay-1 { animation-delay: 0.1s; opacity: 0; }
    .delay-2 { animation-delay: 0.2s; opacity: 0; }
    .delay-3 { animation-delay: 0.3s; opacity: 0; }
    .delay-4 { animation-delay: 0.4s; opacity: 0; }
    .delay-5 { animation-delay: 0.5s; opacity: 0; }
    .delay-6 { animation-delay: 0.6s; opacity: 0; }
    .delay-7 { animation-delay: 0.7s; opacity: 0; }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center px-4 font-inter text-gray-300" style="background-color: #090A14;">

  <!-- Background decorative glow -->
  <div class="fixed inset-0 overflow-hidden pointer-events-none">
    <div class="absolute -top-40 -right-40 w-96 h-96 rounded-full opacity-10" style="background: radial-gradient(circle, #DF6B33, transparent 70%);"></div>
    <div class="absolute -bottom-40 -left-40 w-96 h-96 rounded-full opacity-5" style="background: radial-gradient(circle, #DF6B33, transparent 70%);"></div>
  </div>

  <div class="w-full max-w-md relative">

    <!-- Card -->
    <div class="glass-card rounded-2xl p-8 sm:p-10 shadow-2xl">

      <!-- Logo / Brand -->
      <div class="text-center mb-8 delay-1 animate-fade-in">
        <div class="inline-flex items-center justify-center w-14 h-14 rounded-2xl mb-4" style="background: linear-gradient(135deg, #DF6B33, #e8834e);">
          <i data-lucide="lock-keyhole" class="w-7 h-7 text-white"></i>
        </div>
        <h1 class="font-poppins font-extrabold text-2xl sm:text-3xl text-white tracking-tight">Welcome Back</h1>
        <p class="font-inter text-sm mt-1" style="color: rgba(255,255,255,0.45);">Sign in to continue to your account</p>
      </div>

      <!-- Form -->
      <form class="space-y-5 delay-2 animate-fade-in" onsubmit="return false;">

        <!-- Email -->
        <div>
          <label for="email" class="block font-inter text-sm font-medium text-gray-300 mb-2">Email Address</label>
          <div class="relative">
            <span class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-500">
              <i data-lucide="mail" class="w-4 h-4"></i>
            </span>
            <input
              id="email"
              type="email"
              placeholder="you@example.com"
              autocomplete="email"
              class="w-full bg-white/5 border border-white/10 rounded-xl py-3 pl-11 pr-4 text-gray-200 placeholder-gray-600 font-inter text-sm outline-none focus:border-primary focus:ring-1 focus:ring-primary/40 transition-all duration-200"
            />
          </div>
        </div>

        <!-- Password -->
        <div>
          <label for="password" class="block font-inter text-sm font-medium text-gray-300 mb-2">Password</label>
          <div class="relative">
            <span class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-500">
              <i data-lucide="key-round" class="w-4 h-4"></i>
            </span>
            <input
              id="password"
              type="password"
              placeholder="Enter your password"
              autocomplete="current-password"
              class="w-full bg-white/5 border border-white/10 rounded-xl py-3 pl-11 pr-11 text-gray-200 placeholder-gray-600 font-inter text-sm outline-none focus:border-primary focus:ring-1 focus:ring-primary/40 transition-all duration-200"
            />
            <button type="button" class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-500 hover:text-gray-300 transition-colors" onclick="togglePassword()">
              <i data-lucide="eye-off" id="eye-icon" class="w-4 h-4"></i>
            </button>
          </div>
        </div>

        <!-- Remember + Forgot -->
        <div class="flex items-center justify-between">
          <label class="flex items-center gap-2.5 cursor-pointer group">
            <div class="relative">
              <input type="checkbox" class="sr-only peer" />
              <div class="w-5 h-5 border border-white/20 rounded-md peer-checked:border-primary peer-checked:bg-primary/20 transition-all duration-200 flex items-center justify-center peer-focus:ring-1 peer-focus:ring-primary/40"
                   onclick="this.parentElement.querySelector('input').click(); this.classList.toggle('border-primary'); this.classList.toggle('bg-primary/20')">
                <i data-lucide="check" class="w-3 h-3 text-primary opacity-0 peer-checked:opacity-100 transition-opacity"></i>
              </div>
            </div>
            <span class="font-inter text-sm text-gray-400 group-hover:text-gray-300 transition-colors select-none">Remember me</span>
          </label>
          <a href="#" class="font-inter text-sm transition-colors duration-200" style="color: #DF6B33;" onmouseover="this.style.color='#e8834e'" onmouseout="this.style.color='#DF6B33'">Forgot password?</a>
        </div>

        <!-- Submit -->
        <button type="submit" class="primary-btn w-full font-poppins font-semibold text-white py-3.5 rounded-xl text-sm tracking-wide mt-2">
          Sign In
        </button>

      </form>

      <!-- Divider -->
      <div class="flex items-center gap-3 my-7 delay-3 animate-fade-in">
        <div class="flex-1 h-px bg-white/10"></div>
        <span class="font-inter text-xs text-gray-600">or continue with</span>
        <div class="flex-1 h-px bg-white/10"></div>
      </div>

      <!-- Social Login -->
      <div class="grid grid-cols-3 gap-3 delay-4 animate-fade-in">

        <!-- Google -->
        <button class="social-btn flex items-center justify-center gap-2 border border-white/10 rounded-xl py-3 px-2 group cursor-pointer" onclick="socialLogin('Google')">
          <svg class="w-5 h-5" viewBox="0 0 24 24">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
          </svg>
          <span class="hidden sm:inline font-inter text-xs text-gray-400 group-hover:text-gray-200 transition-colors">Google</span>
        </button>

        <!-- GitHub -->
        <button class="social-btn flex items-center justify-center gap-2 border border-white/10 rounded-xl py-3 px-2 group cursor-pointer" onclick="socialLogin('GitHub')">
          <svg class="w-5 h-5" viewBox="0 0 24 24" fill="white">
            <path d="M12 0C5.374 0 0 5.373 0 12c0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23A11.509 11.509 0 0 1 12 5.803c1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576C20.566 21.797 24 17.3 24 12c0-6.627-5.373-12-12-12z"/>
          </svg>
          <span class="hidden sm:inline font-inter text-xs text-gray-400 group-hover:text-gray-200 transition-colors">GitHub</span>
        </button>

        <!-- Facebook -->
        <button class="social-btn flex items-center justify-center gap-2 border border-white/10 rounded-xl py-3 px-2 group cursor-pointer" onclick="socialLogin('Facebook')">
          <svg class="w-5 h-5" viewBox="0 0 24 24" fill="#1877F2">
            <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>
          </svg>
          <span class="hidden sm:inline font-inter text-xs text-gray-400 group-hover:text-gray-200 transition-colors">Facebook</span>
        </button>

      </div>

      <!-- Sign up link -->
      <p class="text-center font-inter text-sm mt-7 delay-5 animate-fade-in" style="color: rgba(255,255,255,0.4);">
        Don't have an account?
        <a href="register.html" class="font-medium transition-colors duration-200" style="color: #DF6B33;" onmouseover="this.style.color='#e8834e'" onmouseout="this.style.color='#DF6B33'">Create account</a>
      </p>

    </div>

    <!-- Footer -->
    <p class="text-center font-inter text-xs mt-6 delay-6 animate-fade-in" style="color: rgba(255,255,255,0.2);">
      By signing in, you agree to our
      <a href="#" class="hover:underline" style="color: rgba(255,255,255,0.3);">Terms of Service</a>
      and
      <a href="#" class="hover:underline" style="color: rgba(255,255,255,0.3);">Privacy Policy</a>
    </p>

  </div>

  <script>
    // Initialize Lucide icons
    lucide.createIcons();

    // Toggle password visibility
    function togglePassword() {
      const input = document.getElementById('password');
      const icon = document.getElementById('eye-icon');
      if (input.type === 'password') {
        input.type = 'text';
        icon.setAttribute('data-lucide', 'eye');
      } else {
        input.type = 'password';
        icon.setAttribute('data-lucide', 'eye-off');
      }
      lucide.createIcons();
    }

    // Social login handler
    function socialLogin(provider) {
      // Placeholder for social auth logic
      console.log('Login with ' + provider);
    }
  </script>

</body>
</html>
